<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Cumpleaños, Mi Amor</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #d8b4fe, #a78bfa, #c084fc);
      color: #2e1065;
      overflow-x: hidden;
    }

    body.locked {
      overflow: hidden;
    }

    .password-screen {
      position: fixed;
      inset: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #a855f7, #c084fc, #e9d5ff);
      z-index: 9999;
    }

    .password-card {
      width: min(420px, 100%);
      padding: 35px 25px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.95);
      text-align: center;
      box-shadow: 0 20px 60px rgba(88, 28, 135, 0.25);
      animation: fadeUp 0.8s ease;
    }

    .password-card h2 {
      color: #7e22ce;
      margin-bottom: 12px;
      font-size: 2rem;
    }

    .password-card input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #c084fc;
      border-radius: 16px;
      outline: none;
      text-align: center;
      margin-bottom: 18px;
    }

    .password-card input:focus {
      border-color: #7e22ce;
    }

    .password-error {
      display: none;
      margin-top: 15px;
      color: #7e22ce;
      font-weight: 700;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #fff;
    }

    .hero h2 {
      margin-top: 15px;
      font-size: 2rem;
      color: #ede9fe;
    }

    .hero p {
      margin-top: 25px;
      max-width: 700px;
      color: #fff;
    }

    .btn {
      margin-top: 35px;
      padding: 15px 32px;
      border-radius: 999px;
      background: #fff;
      color: #7e22ce;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      padding: 35px;
      box-shadow: 0 20px 50px rgba(88, 28, 135, 0.18);
    }

    .title {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 25px;
      color: #7e22ce;
    }

    .memory {
      background: #f5f3ff;
      border-radius: 25px;
      padding: 25px;
      text-align: center;
    }

    .reason {
      background: #f3e8ff;
      border-left: 6px solid #a855f7;
      padding: 20px;
      border-radius: 18px;
    }

    .photo {
      height: 280px;
      border-radius: 25px;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .footer {
      text-align: center;
      padding: 45px;
      color: #fff;
    }

    .music-control {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: none;
      background: #fff;
      color: #7e22ce;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <header class="hero">
    <h1>Feliz Cumpleaños 💜</h1>
    <h2>Para: Liz</h2>
    <p>Esta página es un detalle hecho con mucho amor.</p>
  </header>

  <section>
    <div class="container">
      <div class="card">
        <h2 class="title">Mi carta</h2>
        <p>
          Amor, gracias por estar en mi vida. Eres una persona increíble y
          espero que este día sea tan especial como tú 💜
        </p>
      </div>
    </div>
  </section>

  <footer class="footer">
    Hecho con amor 💜
  </footer>

</body>
</html>
